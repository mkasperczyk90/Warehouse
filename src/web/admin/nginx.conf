# Templated: the official nginx image runs envsubst over /etc/nginx/templates/*.template at startup,
# substituting ${LISTEN_PORT} and ${GATEWAY_UPSTREAM} (see Dockerfile). nginx runtime vars ($uri, …)
# are left alone (NGINX_ENVSUBST_FILTER restricts substitution to our two vars).
server {
    listen ${LISTEN_PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # When MSW is off (VITE_USE_MOCKS=false), the SPA's relative /api calls are reverse-proxied to the
    # Gateway here, keeping everything same-origin (no CORS). When MSW is on, the browser worker
    # intercepts /api in-page and this block is never reached.
    location /api/ {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: client-side routing (TanStack Router) — unknown paths fall back to the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The shell and the mock worker must always revalidate so a new deploy is
    # picked up; hashed build assets under /assets are safe to cache hard.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /mockServiceWorker.js { add_header Cache-Control "no-cache"; }
    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
