version: 2
updates:
  # .NET — central package management (Directory.Packages.props at the root).
  - package-ecosystem: nuget
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns: ['*']

  # The two SPAs and the two e2e harnesses each have their own lockfile.
  # Group aggressively so a weekly run lands ~2 PRs per directory (safe vs. breaking),
  # not one-per-package: minor/patch in one PR, the riskier majors batched in another.
  - package-ecosystem: npm
    directories:
      - '/src/web/admin'
      - '/src/web/terminal'
      - '/tests/e2e/admin'
      - '/tests/e2e/terminal'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']
      npm-major:
        update-types: ['major']

  # Keep the workflow actions themselves current — all action bumps in a single PR.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']
