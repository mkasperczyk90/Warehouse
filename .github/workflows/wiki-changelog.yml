name: Wiki Changelog

# Publishes release changelogs to the repository's GitHub Wiki under Changelog/.
# Triggers on new GitHub Releases (created by release-please or manually).
# Each release creates ONE changelog page with all components: Changelog/v<version>.md

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-wiki:
    name: Publish changelog to Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v7
        with:
          persist-credentials: "true"

      - name: Checkout Wiki repo
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          persist-credentials: "false"

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          
          # Extract version number from tag
          # Tags can be: v1.0.0, admin-v1.0.0, gateway-v2.1.0, etc.
          if [[ "$VERSION" =~ ^v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          elif [[ "$VERSION" =~ ^(.+)-v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            # This is a per-component release, component=${BASH_REMATCH[1]}, version=${BASH_REMATCH[2]}
            VER="${BASH_REMATCH[2]}"
          else
            VER="$VERSION"
          fi
          
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "page_file=v${VER}.md" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate combined changelog page for wiki
        id: changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TITLE: ${{ github.event.release.name }}
          CREATED_ON: ${{ github.event.release.created_at }}
        run: |
          set -euo pipefail
          
          PAGE_FILE="wiki/Changelog/v${VERSION}.md"
          mkdir -p wiki/Changelog
          
          # Extract release date from ISO format
          RELEASE_DATE=$(date -u -d "${CREATED_ON}" +"%B %d, %Y" 2>/dev/null || date -u +"%B %d, %Y")
          
          # Write the page using echo commands to avoid YAML document issues
          echo '---' > "$PAGE_FILE"
          echo "title: 'Changelog ${VERSION}'" >> "$PAGE_FILE"
          echo 'status: published' >> "$PAGE_FILE"
          echo "created_on: '${CREATED_ON}'" >> "$PAGE_FILE"
          echo '---' >> "$PAGE_FILE"
          echo '' >> "$PAGE_FILE"
          echo "# Changelog v${VERSION}" >> "$PAGE_FILE"
          echo '' >> "$PAGE_FILE"
          echo "**Release date:** ${RELEASE_DATE}" >> "$PAGE_FILE"
          echo '' >> "$PAGE_FILE"
          
          if [ -n "${RELEASE_TITLE}" ]; then
            echo "**Tag:** \`${{ steps.version.outputs.tag }}\`" >> "$PAGE_FILE"
            echo '' >> "$PAGE_FILE"
          fi
          
          echo "---" >> "$PAGE_FILE"
          echo '' >> "$PAGE_FILE"
          echo '' >> "$PAGE_FILE"
          
          # Append the release body content
          echo "$RELEASE_BODY" >> "$PAGE_FILE"
          
          echo "page_file=${PAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Initialize changelog index
        run: |
          INDEX_FILE="wiki/Changelog/index.md"
          
          if [ ! -f "$INDEX_FILE" ]; then
            echo '---' > "$INDEX_FILE"
            echo 'title: "Changelog"' >> "$INDEX_FILE"
            echo 'status: active' >> "$INDEX_FILE"
            echo '---' >> "$INDEX_FILE"
            echo '' >> "$INDEX_FILE"
            echo '# Changelog' >> "$INDEX_FILE"
            echo '' >> "$INDEX_FILE"
            echo 'Complete release history for the Warehouse project.' >> "$INDEX_FILE"
            echo '' >> "$INDEX_FILE"
            echo '## Recent Releases' >> "$INDEX_FILE"
            echo '' >> "$INDEX_FILE"
            echo '| Version | Date |' >> "$INDEX_FILE"
            echo '|---------|------|' >> "$INDEX_FILE"
          fi

      - name: Update changelog index
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          
          INDEX_FILE="wiki/Changelog/index.md"
          RELEASE_DATE=$(date -u -d "${{ github.event.release.created_at }}" +"%Y-%m-%d" 2>/dev/null || date -u +"%Y-%m-%d")
          
          # Create the table row for this release
          TABLE_ROW="| [v${VERSION}](Changelog/v${VERSION}.md) | ${RELEASE_DATE} |"
          
          # Insert new entry right after the header separator
          NEW_FILE=$(mktemp)
          
          # Find the separator line number
          separator_line=$(grep -n '^|---' "$INDEX_FILE" | head -1 | cut -d: -f1)
          
          # If no match, try the alternative separator format
          if [ -z "$separator_line" ] || [ "$separator_line" = "" ]; then
            separator_line=$(grep -n '^|-*' "$INDEX_FILE" | head -1 | cut -d: -f1)
          fi
          
          if [ -z "$separator_line" ] || [ "$separator_line" = "" ]; then
            echo "Warning: Could not find table separator in index. Appending entry."
            echo "$TABLE_ROW" >> "$INDEX_FILE"
          else
            # Write content before separator
            head -n "$separator_line" "$INDEX_FILE" > "$NEW_FILE"
            
            # Write new entry
            echo "$TABLE_ROW" >> "$NEW_FILE"
            
            # Write rest of original content
            tail -n +"$((separator_line + 1))" "$INDEX_FILE" >> "$NEW_FILE"
            
            # Replace original
            mv "$NEW_FILE" "$INDEX_FILE"
          fi

      - name: Commit wiki changes
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs(changelog): add v${{ steps.version.outputs.version }} changelog"
          git push