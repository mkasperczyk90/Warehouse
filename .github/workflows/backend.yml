name: Backend

# .NET 10 solution: build (warnings-as-errors doubles as the analyzer/format gate),
# run every test project (unit + architecture + Testcontainers-backed integration),
# then publish each deployable service as a downloadable artifact. No deployment.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '!src/web/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Warehouse.slnx'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '!src/web/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'Warehouse.slnx'
      - '.github/workflows/backend.yml'

# A new push to the same branch/PR cancels the in-flight run.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest   # Docker is preinstalled here — the integration tests need it (Testcontainers).
    permissions:
      contents: read
      checks: write          # let the test reporter publish a per-test Check run.
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # Central package management means no per-project lock files; key the cache off the manifests.
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Warehouse.slnx

      - name: Build (Release, warnings-as-errors)
        run: dotnet build Warehouse.slnx -c Release --no-restore

      - name: Test (unit + architecture + integration)
        run: >
          dotnet test Warehouse.slnx -c Release --no-build
          --logger trx
          --collect "XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/TestResults

      # Surfaces a per-test pass/fail Check (with failure annotations on the PR) from the TRX files,
      # so you can see which tests broke without downloading the artifact. Runs even when tests fail.
      - name: Publish test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Backend tests
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      # Turn the cobertura output (from coverlet.collector) into a markdown table on the run's summary page.
      - name: Coverage summary
        if: ${{ !cancelled() }}
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ github.workspace }}/TestResults/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coveragereport
          reporttypes: MarkdownSummaryGithub

      - name: Append coverage to job summary
        if: ${{ !cancelled() }}
        run: cat ${{ github.workspace }}/coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload test results & coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: warn

  publish:
    name: Publish ${{ matrix.name }}
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            project: src/Gateway/Warehouse.Gateway/Warehouse.Gateway.csproj
          - name: masterdata-api
            project: src/Services/MasterData/Warehouse.MasterData.Api/Warehouse.MasterData.Api.csproj
          - name: warehousing-api
            project: src/Services/Warehousing/Warehouse.Warehousing.Api/Warehouse.Warehousing.Api.csproj
          - name: logistics-api
            project: src/Services/Logistics/Warehouse.Logistics.Api/Warehouse.Logistics.Api.csproj
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish
        run: >
          dotnet publish ${{ matrix.project }}
          -c Release -o publish/${{ matrix.name }} /p:UseAppHost=false

      - name: Upload published service
        uses: actions/upload-artifact@v7
        with:
          name: service-${{ matrix.name }}
          path: publish/${{ matrix.name }}
          if-no-files-found: error
