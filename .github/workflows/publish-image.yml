name: Publish image (reusable)

# Build one image and (for non-CI channels) push it to GHCR, scan it, sign it with
# cosign (keyless/OIDC) and attach SLSA provenance + an SBOM. Called by:
#   - docker.yml        → channel `ci` (PRs, build-only) / `edge` (main, push edge+sha)
#   - release-please.yml → channel `release` (push semver X.Y.Z + X.Y + latest)
on:
  workflow_call:
    inputs:
      name:
        description: Image suffix, e.g. gateway → ghcr.io/<owner>/warehouse-gateway
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      version:
        description: Version to stamp into the build + image tag (release channel).
        required: false
        type: string
        default: 0.0.0
      channel:
        description: ci | edge | release
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25 # a stuck multi-arch build fails instead of hanging the run for hours
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless cosign signing (OIDC → Fulcio/Rekor)
      security-events: write # upload the Trivy SARIF
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/warehouse-${{ inputs.name }}
      PUSH: ${{ inputs.channel != 'ci' }}
    steps:
      - uses: actions/checkout@v7

      # QEMU lets the amd64 runner cross-build the arm64 image (Graviton on ECS is cheaper).
      - name: Setup QEMU
        if: env.PUSH == 'true'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Compute tags & metadata
        id: meta
        shell: bash
        run: |
          short="${GITHUB_SHA::7}"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          case "${{ inputs.channel }}" in
            ci)
              tags="${IMAGE}:pr-${short}" ;;
            edge)
              tags="${IMAGE}:edge,${IMAGE}:sha-${short}" ;;
            release)
              v="${{ inputs.version }}"; minor="${v%.*}"
              tags="${IMAGE}:${v},${IMAGE}:${minor},${IMAGE}:latest,${IMAGE}:sha-${short}" ;;
            *)
              echo "unknown channel ${{ inputs.channel }}" >&2; exit 1 ;;
          esac
          {
            echo "tags=${tags}"
            echo "created=${created}"
            echo "scan_ref=${IMAGE}:pr-${short}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          # PRs build a single arch so the image can be loaded locally and scanned; pushes go
          # multi-arch (amd64 + arm64) — a multi-arch result can't be `load`ed, so it's scanned by digest.
          platforms: ${{ env.PUSH == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          build-args: |
            VERSION=${{ inputs.version }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=warehouse-${{ inputs.name }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          push: ${{ env.PUSH }}
          load: ${{ env.PUSH != 'true' }}
          provenance: ${{ env.PUSH == 'true' }}
          sbom: ${{ env.PUSH == 'true' }}
          cache-from: type=gha,scope=${{ inputs.name }}
          cache-to: type=gha,scope=${{ inputs.name }},mode=max

      # Report-only (exit-code 0): results land in the Security tab. Scan the local image
      # on PRs, the pushed digest otherwise.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.PUSH == 'true' && format('{0}@{1}', env.IMAGE, steps.build.outputs.digest) || steps.meta.outputs.scan_ref }}
          format: sarif
          output: trivy-${{ inputs.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ inputs.name }}.sarif
          category: trivy-${{ inputs.name }}

      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless)
        if: env.PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
