name: Frontend

# The two SPAs (admin = Vite/React, terminal = Expo/React Native Web). A `detect` job works
# out which app changed; only that app is typechecked/linted/tested/built. A `Frontend gate`
# job always runs and reflects the result — require THAT check (it reports on every PR, so it
# avoids the path-filter "skipped check never reports" trap).
on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/frontend.yml'
  pull_request: {} # every PR, so the gate always reports

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect affected apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: changes
        with:
          filters: |
            admin:
              - 'src/web/admin/**'
            terminal:
              - 'src/web/terminal/**'
            workflow:
              - '.github/workflows/frontend.yml'
      - id: set
        uses: actions/github-script@v7
        with:
          script: |
            const f = ${{ toJSON(steps.changes.outputs) }};
            const t = (k) => f[k] === 'true';
            const apps = [
              { app: 'admin', dir: 'src/web/admin', build: 'build' },
              { app: 'terminal', dir: 'src/web/terminal', build: 'build:web' },
            ];
            const include = apps.filter((a) => t('workflow') || t(a.app));
            core.info('Apps to build: ' + (include.map((a) => a.app).join(', ') || '(none)'));
            core.setOutput('matrix', JSON.stringify({ include }));

  build-test:
    name: ${{ matrix.app }}
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20 # a hung typecheck/build/test fails fast instead of burning the 6h default
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    permissions:
      contents: read
      checks: write # let the test reporter publish a per-test Check run.
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install
        run: npm ci

      # Generates public/mockServiceWorker.js (gitignored) so the built bundle can boot MSW.
      # Admin only — the terminal no longer mocks (it always calls the real Gateway), so it has
      # no `mock:init` script.
      - name: Generate MSW worker
        if: matrix.app == 'admin'
        run: npm run mock:init

      - name: Typecheck
        run: npm run typecheck

      # ESLint (flat config) + Prettier — admin only; the terminal uses `expo lint`
      # with no committed config, so it stays out of this gate for now.
      - name: Lint & format check
        if: matrix.app == 'admin'
        run: |
          npm run lint
          npm run format:check

      # Only admin has a test:run script; --if-present makes this a no-op for terminal.
      # The extra args make vitest also emit JUnit for the test reporter below.
      - name: Unit tests
        run: npm run test:run --if-present -- --reporter=default --reporter=junit --outputFile=test-results/vitest-junit.xml

      # Per-test pass/fail Check from the vitest JUnit output (admin only). Guarded on the
      # report existing, so a failure in an earlier step (which skips the tests, leaving no
      # report) doesn't add a confusing "No test report files were found" error on top.
      - name: Publish test report
        if: ${{ !cancelled() && matrix.app == 'admin' && hashFiles(format('{0}/test-results/vitest-junit.xml', matrix.dir)) != '' }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Frontend tests (admin)
          path: ${{ matrix.dir }}/test-results/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Build
        run: npm run ${{ matrix.build }}

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: web-${{ matrix.app }}-dist
          path: ${{ matrix.dir }}/dist
          if-no-files-found: error

  # Always-running aggregate status — this is the check to mark required in the ruleset.
  frontend-gate:
    name: Frontend gate
    needs: [detect, build-test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          result="${{ needs.build-test.result }}"
          echo "build-test result: $result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "Frontend OK (built the affected app, or nothing to build)."
          else
            echo "::error::Frontend build/test failed"
            exit 1
          fi
