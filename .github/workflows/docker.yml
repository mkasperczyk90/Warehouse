name: Docker images

# Validates that every app's Dockerfile builds (backend services + both SPAs).
# Images are built with buildx + layer cache but NOT pushed anywhere — this is a
# build gate, not a deployment.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '**/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '**/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload the Trivy SARIF to the Security tab.
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend services build from the repo root (cross-project references + Directory.*.props).
          - name: gateway
            context: .
            dockerfile: src/Gateway/Warehouse.Gateway/Dockerfile
          - name: masterdata-api
            context: .
            dockerfile: src/Services/MasterData/Warehouse.MasterData.Api/Dockerfile
          - name: warehousing-api
            context: .
            dockerfile: src/Services/Warehousing/Warehouse.Warehousing.Api/Dockerfile
          - name: logistics-api
            context: .
            dockerfile: src/Services/Logistics/Warehouse.Logistics.Api/Dockerfile
          # SPAs build from their own directory.
          - name: admin
            context: src/web/admin
            dockerfile: src/web/admin/Dockerfile
          - name: terminal
            context: src/web/terminal
            dockerfile: src/web/terminal/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true             # keep the image locally so it can be scanned below.
          tags: warehouse-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      # Scan the built image for known CVEs. Report-only (exit-code 0) — results land in the
      # Security tab via SARIF rather than blocking the build; tighten exit-code later to gate.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: warehouse-${{ matrix.name }}:ci
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      # Software bill of materials for the image — useful artifact for supply-chain auditing.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: warehouse-${{ matrix.name }}:ci
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: warn
