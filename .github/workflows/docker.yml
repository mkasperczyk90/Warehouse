name: Docker images

# On PRs: build every image as a gate (no push). On push to main: build + push to GHCR
# tagged `edge` and `sha-<short>`, scanned (Trivy), signed (cosign) with SBOM + provenance.
# Semver release tags (X.Y.Z / latest) are published by release-please.yml. The actual
# build/scan/sign/attest logic lives in the reusable publish-image.yml.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '**/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
      - '.github/workflows/publish-image.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '**/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
      - '.github/workflows/publish-image.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  images:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend services build from the repo root (cross-project references + Directory.*.props).
          - { name: gateway, context: ., dockerfile: src/Gateway/Warehouse.Gateway/Dockerfile }
          - {
              name: masterdata-api,
              context: .,
              dockerfile: src/Services/MasterData/Warehouse.MasterData.Api/Dockerfile,
            }
          - {
              name: warehousing-api,
              context: .,
              dockerfile: src/Services/Warehousing/Warehouse.Warehousing.Api/Dockerfile,
            }
          - {
              name: logistics-api,
              context: .,
              dockerfile: src/Services/Logistics/Warehouse.Logistics.Api/Dockerfile,
            }
          # SPAs build from their own directory.
          - { name: admin, context: src/web/admin, dockerfile: src/web/admin/Dockerfile }
          - { name: terminal, context: src/web/terminal, dockerfile: src/web/terminal/Dockerfile }
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: ./.github/workflows/publish-image.yml
    with:
      name: ${{ matrix.name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      # PRs build only; pushes to main publish the `edge` + `sha-<short>` images.
      channel: ${{ github.event_name == 'pull_request' && 'ci' || 'edge' }}
